    description: "We locate off-market opportunities and negotiate deals on your behalf"
    journey_phase: "settling_up"
    what_you_get: "Access to properties you won't find on MLS or listing sites"
    features:
      - "Bird Dog Fee: sourcing an off-market property opportunity and introducing it to the buyer"
