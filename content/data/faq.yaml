# FAQ Configuration - Puerto Rico Relocation Questions
# Organized by common concern categories

faqs:
  # Property & Housing Questions
  property_housing:
    category: "Property & Housing"
    icon: "fa-home"
    questions:
      - question: "How do you find properties that aren't listed online?"
        answer: |
          <p>In Puerto Rico, a lot of deals never hit Zillow, Realtor, or even MLS. If you want off-market properties, you have to work the ground. Here’s how investors actually find them—and which methods work best:</p>
          <ol>
            <li><strong>Walk the neighborhoods.</strong> Look for abandoned/overgrown homes, disconnected utilities, or mail piling up. Write down the address and parcel number (catastro), then pull owner info in CRIM and reach out.</li>
            <li><strong>CRIM + Registro de la Propiedad.</strong> CRIM helps identify owners and tax status; the Registry confirms ownership, liens, and successions. Delinquent taxes and multiple heirs can be opportunities.</li>
            <li><strong>Drive-for-dollars + local contacts.</strong> Neighbors often know the story: who owns it, whether the owner moved off-island, or if there’s a family dispute.</li>
            <li><strong>Network with local pros.</strong> Attorneys (successions/divorce), notarios, property managers, contractors, electricians, plumbers—these people hear about deals first.</li>
            <li><strong>Banks & cooperativas (in person).</strong> Many REO/foreclosure opportunities aren’t posted online. Ask for “Propiedades reposeídas.”</li>
            <li><strong>Local auctions.</strong> Judicial auctions and bank postings can be great deals, but require title research and certified funds.</li>
            <li><strong>Facebook Marketplace & WhatsApp groups.</strong> Search in Spanish (e.g., “casa abandonada,” “propiedad heredada,” “se vende por dueño”).</li>
            <li><strong>Door knocking.</strong> Face-to-face often works better than cold calls in PR.</li>
            <li><strong>Inherited properties (succession).</strong> Very common in PR—often discounted but can take longer to close.</li>
          </ol>
          <p><strong>Bottom line:</strong> Off-market in Puerto Rico = boots on the ground + local relationships.</p>
        
      - question: "What's the real cost of buying property in Puerto Rico?"
        answer: |
          <p>Here’s a clear breakdown of the real costs so you can budget accurately (not just the purchase price):</p>
          <h4>1) Closing costs (buyer)</h4>
          <ul>
            <li><strong>Notary fees:</strong> often ~1%–2% of purchase price (sales are notarized by attorney-notary).</li>
            <li><strong>Registry & government fees:</strong> filing + stamps/transfer fees vary by deal.</li>
            <li><strong>Title insurance (recommended):</strong> optional but wise for dispute protection.</li>
            <li><strong>Extra legal fees (if needed):</strong> depends on complexity.</li>
            <li><strong>Appraisal & inspection:</strong> typical add-ons that vary by property size/condition.</li>
            <li><strong>Lender fees (if financing):</strong> origination/underwriting/escrow, etc.</li>
          </ul>
          <p><strong>Typical total closing-cost budget:</strong> many buyers plan for ~3%–6% of purchase price (sometimes higher for complex transactions).</p>
          <h4>2) Ongoing costs after purchase</h4>
          <ul>
            <li><strong>Property taxes (CRIM):</strong> often lower than mainland, but depends on classification and exemptions.</li>
            <li><strong>Insurance:</strong> hurricane exposure matters; flood insurance may be required in certain zones.</li>
            <li><strong>HOA/condo fees:</strong> if applicable.</li>
          </ul>
          <p><strong>Tip:</strong> Ask for a detailed closing-cost worksheet (“good faith estimate”) early so you’re not surprised at closing.</p>
        
      - question: "Is it safe to buy property in flood zones?"
        answer: |
          <p><strong>Short answer:</strong> yes, it can be safe — but only if you understand the zone and price the risk correctly.</p>
          <p><strong>Not all flood zones are the same.</strong> Common FEMA zones you’ll see:</p>
          <ul>
            <li><strong>Zone X:</strong> low to moderate risk (insurance often optional).</li>
            <li><strong>Zone A / AE:</strong> higher risk (flood insurance required if financing).</li>
            <li><strong>Zone VE:</strong> very high risk (storm surge/waves) — usually not worth it unless you’re experienced and the numbers are strong.</li>
          </ul>
          <p><strong>When it can make sense:</strong> elevated property, no history of interior flooding (verify), reasonable insurance cost, and the price reflects the risk.</p>
          <p><strong>When to walk away:</strong> VE zones on the coast, visible water lines/mold patterns, neighbors say it floods often, or insurance kills the cash flow.</p>
          <p><strong>Due diligence checklist:</strong> confirm FEMA map, get insurance quotes before closing, ask neighbors about history, and verify drainage conditions and elevation when possible.</p>
        
      - question: "Can I get a mortgage as a non-resident?"
        answer: |
          <p>Yes — you can get a mortgage in Puerto Rico as a non-resident, but it’s more paperwork and varies by bank.</p>
          <h4>What lenders typically require</h4>
          <ul>
            <li>Valid ID (passport/driver’s license)</li>
            <li>Proof of income and employment (tax returns, pay stubs, contracts)</li>
            <li>Credit history (U.S. credit helps; some accept alternatives)</li>
            <li>Proof of assets (bank/investment statements)</li>
            <li><strong>Higher down payment:</strong> commonly ~20–25%+ for non-residents</li>
          </ul>
          <h4>What to expect</h4>
          <ul>
            <li>Bank-by-bank variation (local lenders are often easier than mainland)</li>
            <li>Stricter documentation and verification</li>
            <li>Sometimes higher rates depending on profile</li>
          </ul>
          <p><strong>Tip:</strong> Get pre-approval early and work with a local mortgage broker and an attorney-notary familiar with PR closings.</p>

